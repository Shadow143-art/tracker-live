<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tracker - Student & Staff Networking</title>
    <link rel="manifest" href="manifest.json">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
        }
        
        .container {
            text-align: center;
            padding: 40px;
            max-width: 600px;
        }
        
        .logo {
            width: 120px;
            height: 120px;
            background: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        
        .logo span {
            font-size: 60px;
            font-weight: bold;
            color: #667eea;
        }
        
        h1 {
            font-size: 3em;
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }
        
        p {
            font-size: 1.2em;
            margin-bottom: 40px;
            opacity: 0.9;
            line-height: 1.6;
        }
        
        .buttons {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
        }
        
        .btn {
            padding: 15px 40px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: bold;
            font-size: 1.1em;
            transition: all 0.3s ease;
        }
        
        .btn-primary {
            background: white;
            color: #667eea;
        }
        
        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        
        .btn-secondary {
            border: 2px solid white;
            color: white;
        }
        
        .btn-secondary:hover {
            background: white;
            color: #667eea;
        }
        
        .features {
            margin-top: 60px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 30px;
        }
        
        .feature {
            padding: 20px;
        }
        
        .feature-icon {
            font-size: 2.5em;
            margin-bottom: 10px;
        }
        
        .feature h3 {
            font-size: 1.1em;
            margin-bottom: 5px;
        }
        
        .feature p {
            font-size: 0.9em;
            opacity: 0.8;
        }
        
        footer {
            margin-top: 60px;
            opacity: 0.7;
            font-size: 0.9em;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <span>T</span>
        </div>
        
        <h1>Tracker</h1>
        <p>Connect, network, and grow your career with the ultimate campus networking platform for students and staff.</p>
        
        <div class="buttons">
            <a href="https://your-vercel-or-render-url.vercel.app" class="btn btn-primary">Launch App</a>
            <a href="https://github.com/Shadow143-art/tracker" class="btn btn-secondary">View Code</a>
        </div>
        
        <div class="features">
            <div class="feature">
                <div class="feature-icon">👥</div>
                <h3>Connect</h3>
                <p>Find peers & mentors</p>
            </div>
            <div class="feature">
                <div class="feature-icon">💬</div>
                <h3>Message</h3>
                <p>Real-time chat</p>
            </div>
            <div class="feature">
                <div class="feature-icon">📱</div>
                <h3>Mobile</h3>
                <p>App available</p>
            </div>
        </div>
        
        <footer>
            <p>© 2026 Tracker. Built with ❤️ for students and staff.</p>
        </footer>
    </div>
</body>
</html>
